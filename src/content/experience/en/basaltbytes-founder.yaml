detailGroups:
  - title: Atoly - Booking pages your customers will love to use
    summary: >-
      My own booking SaaS for independents and small businesses, designed to
      make scheduling and payments feel simple for both businesses and their
      customers.
    achievements:
      - I came up with the product, defined its positioning, and drove its go-to-market.
      - I architected a multi-tenant platform with Stripe subscriptions for the platform itself, plus Stripe Connect so users get paid when a booking is made.
      - I orchestrate booking lifecycle events for bookings, cancellations, and rescheduling, including calendar synchronization, email delivery, and SMS reminders.
      - I own full-stack design and delivery, deployment, observability, analytics, and customer support.
    items: []
