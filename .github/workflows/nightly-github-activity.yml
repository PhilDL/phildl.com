name: Refresh GitHub activity

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 8.6.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          cache: pnpm
          node-version-file: ".node-version"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh GitHub activity snapshot
        run: pnpm refresh:github-activity

      - name: Build site
        run: pnpm build

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- src/data/github-activity.json; then
            echo "No GitHub activity changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/github-activity.json
          git commit -m "chore: refresh github activity"
          git push

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
